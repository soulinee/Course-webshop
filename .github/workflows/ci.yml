name: Course Marketplace CI

on:
  push:
    branches: [main]

  pull_request:
    branches: [main]

jobs:

  frontend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend/OnlineCourseMarketPlace_Frontend/frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/OnlineCourseMarketPlace_Frontend/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React app
        run: npm run build

  backend:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend/OnlineCourseMarketPlace_Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore YoutubeWebApi.sln

      - name: Build
        run: dotnet build YoutubeWebApi.sln --configuration Release --no-restore